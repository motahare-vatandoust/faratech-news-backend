# Install: sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/faratech-api
#         sudo ln -sf /etc/nginx/sites-available/faratech-api /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d api.faratech.news

server {
    listen 80;
    listen [::]:80;
    server_name api.faratech.news;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
